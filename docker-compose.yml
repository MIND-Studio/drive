services:
  css:
    image: solidproject/community-server:latest
    container_name: mind-drive-css
    ports:
      - "3061:3061"
    volumes:
      - ./.css-data:/data
      - ./infra/css/seed.json:/seed.json:ro
    command:
      - --port=3061
      - --baseUrl=http://localhost:3061/
      - --rootFilePath=/data
      - --config=@css:config/file.json
      - --seedConfig=/seed.json
      - --loggingLevel=warn
    restart: unless-stopped
